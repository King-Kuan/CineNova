<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vlogs — CineNova</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .vlogs-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 60px 40px 40px;
    }
    .vlogs-header h1 {
      font-family: var(--font-display);
      font-size: 48px; letter-spacing: 2px; margin-bottom: 8px;
    }
    .vlogs-header p { color: var(--text2); font-size: 14px; }
    .vlogs-big-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }
    .vlog-card-big {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: var(--transition);
    }
    .vlog-card-big:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: var(--shadow); }
    .vlog-embed-big { aspect-ratio: 16/9; }
    .vlog-embed-big iframe { width: 100%; height: 100%; border: none; display: block; }
    .vlog-body-big { padding: 20px; }
    .vlog-title-big { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .vlog-desc-big { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
    .vlog-date { font-size: 12px; color: var(--text3); }
    @media(max-width:768px) {
      .vlogs-header { padding: 40px 20px 28px; }
      .vlogs-header h1 { font-size: 36px; }
      .vlogs-big-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="navbar-wrap"></div>
<div id="ribbon-ad-wrap"></div>

<main class="page-wrap">
  <div class="vlogs-header">
    <h1>📹 Vlogs</h1>
    <p>Watch curated video content, reviews, and entertainment</p>
  </div>

  <section class="section">
    <div class="vlogs-big-grid" id="vlogs-grid">
      <div class="loader"></div>
    </div>
  </section>
</main>

<div id="footer-wrap"></div>
<div class="toast-container"></div>

<script type="module">
import { db, renderNavbar, renderFooter, initNavbar, getYouTubeId, formatDate } from '/js/firebase-config.js';
import { injectAds } from '/js/ads.js';
import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById('navbar-wrap').innerHTML = renderNavbar('vlogs');
document.getElementById('footer-wrap').innerHTML = renderFooter();
initNavbar('vlogs');
injectAds();

async function loadVlogs() {
  try {
    const q = query(collection(db, 'vlogs'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    const grid = document.getElementById('vlogs-grid');
    if (snap.empty) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📹</div><h3>No vlogs posted yet</h3><p>Check back soon!</p></div>';
      return;
    }
    grid.innerHTML = snap.docs.map(d => {
      const v = { id: d.id, ...d.data() };
      const vid = getYouTubeId(v.youtubeUrl || '');
      return `
      <div class="vlog-card-big">
        <div class="vlog-embed-big">
          ${vid ? `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" loading="lazy"></iframe>` : '<div style="background:var(--bg2);height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3)">No video</div>'}
        </div>
        <div class="vlog-body-big">
          <div class="vlog-title-big">${v.title}</div>
          ${v.description ? `<div class="vlog-desc-big">${v.description}</div>` : ''}
          <div class="vlog-date">${formatDate(v.createdAt)}</div>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('vlogs-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><h3>Failed to load vlogs</h3></div>';
  }
}

loadVlogs();
</script>
</body>
</html>
