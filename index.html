<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineNova — Movies, Trailers & Downloads</title>
  <meta name="description" content="Discover and download the latest movies. Watch trailers, browse by genre, and enjoy free downloads on CineNova.">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>

<div id="navbar-wrap"></div>
<div id="ribbon-ad-wrap"></div>

<main class="page-wrap">

  <!-- HERO -->
  <section class="hero" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-badge">🔥 Featured Film</div>
      <h1 class="hero-title" id="hero-title">Loading...</h1>
      <div class="hero-meta" id="hero-meta"></div>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-actions" id="hero-actions"></div>
    </div>
  </section>

  <!-- TRENDING -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Trending Now</h2>
      <a href="/movies.html" class="section-link">View All →</a>
    </div>
    <div class="movies-grid" id="trending-grid">
      <div class="loader"></div>
    </div>
  </section>

  <!-- GENRES -->
  <section class="section" style="padding-top:0">
    <div class="section-header">
      <h2 class="section-title">Browse by Genre</h2>
    </div>
    <div class="filter-chips" id="genre-chips"></div>
  </section>

  <!-- LATEST MOVIES -->
  <section class="section" style="background:var(--bg2); padding-top:60px;">
    <div class="section-header">
      <h2 class="section-title">Latest Movies</h2>
      <a href="/movies.html" class="section-link">See More →</a>
    </div>
    <div class="movies-grid" id="latest-grid">
      <div class="loader"></div>
    </div>
  </section>

  <!-- VLOGS PREVIEW -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Latest Vlogs</h2>
      <a href="/vlogs.html" class="section-link">All Vlogs →</a>
    </div>
    <div class="vlogs-grid" id="vlogs-preview">
      <div class="loader"></div>
    </div>
  </section>

</main>

<div id="footer-wrap"></div>
<div class="toast-container"></div>

<script type="module">
import { db, renderNavbar, renderFooter, initNavbar, getYouTubeId } from '/js/firebase-config.js';
import { injectAds } from '/js/ads.js';
import {
  collection, query, orderBy, limit, getDocs, where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById('navbar-wrap').innerHTML = renderNavbar('home');
document.getElementById('footer-wrap').innerHTML = renderFooter();
initNavbar('home');
injectAds();

const CATEGORIES = ['Action','Drama','Comedy','Horror','Thriller','Romance','Sci-Fi','Animation','Documentary','Fantasy'];

function movieCardHTML(m) {
  return `
  <div class="movie-card" onclick="location.href='/movie.html?id=${m.id}'">
    ${m.isNew ? '<span class="movie-card-badge">New</span>' : ''}
    <div class="movie-card-poster">
      <img src="${m.posterUrl || 'https://via.placeholder.com/200x300/141c26/4a6070?text=No+Image'}" alt="${m.title}" loading="lazy">
      <div class="movie-card-overlay">
        <div class="movie-card-play">▶</div>
        <div style="font-size:12px;color:var(--text2);text-align:center">Watch Trailer</div>
      </div>
    </div>
    <div class="movie-card-body">
      <div class="movie-card-title">${m.title}</div>
      <div class="movie-card-meta">
        <span class="movie-card-year">${m.year || ''}</span>
        <span class="movie-card-cat">${m.category || ''}</span>
      </div>
    </div>
  </div>`;
}

async function loadHero() {
  try {
    const q = query(collection(db, 'movies'), orderBy('createdAt', 'desc'), limit(1));
    const snap = await getDocs(q);
    if (snap.empty) return;
    const m = { id: snap.docs[0].id, ...snap.docs[0].data() };
    document.getElementById('hero-bg').style.backgroundImage = `url('${m.posterUrl}')`;
    document.getElementById('hero-title').textContent = m.title;
    document.getElementById('hero-desc').textContent = m.description || '';
    document.getElementById('hero-meta').innerHTML = `
      <span class="hero-meta-tag">${m.category || ''}</span>
      <span>${m.year || ''}</span>
      ${m.rating ? `<span class="stars">${'★'.repeat(Math.round(m.rating))}${'☆'.repeat(5 - Math.round(m.rating))}</span>` : ''}`;
    document.getElementById('hero-actions').innerHTML = `
      <a href="/movie.html?id=${m.id}" class="btn btn-primary">▶ Watch Trailer</a>
      <a href="/movie.html?id=${m.id}#download" class="btn btn-ghost">⬇ Download</a>`;
  } catch (e) { console.error(e); }
}

async function loadTrending() {
  try {
    const q = query(collection(db, 'movies'), orderBy('downloads', 'desc'), limit(8));
    const snap = await getDocs(q);
    const grid = document.getElementById('trending-grid');
    if (snap.empty) { grid.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><h3>No movies yet</h3></div>'; return; }
    grid.innerHTML = snap.docs.map(d => movieCardHTML({ id: d.id, ...d.data() })).join('');
  } catch (e) {
    document.getElementById('trending-grid').innerHTML = '<div class="empty-state"><p>Failed to load movies.</p></div>';
  }
}

async function loadLatest() {
  try {
    const q = query(collection(db, 'movies'), orderBy('createdAt', 'desc'), limit(12));
    const snap = await getDocs(q);
    const grid = document.getElementById('latest-grid');
    if (snap.empty) { grid.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><h3>No movies yet</h3></div>'; return; }
    grid.innerHTML = snap.docs.map(d => movieCardHTML({ id: d.id, ...d.data() })).join('');
    snap.docs.forEach(d => {
      const m = d.data();
      if (m.createdAt) {
        const diff = (Date.now() - m.createdAt.toMillis()) / (1000 * 60 * 60 * 24);
        if (diff < 7) {
          const card = document.querySelector(`[onclick="location.href='/movie.html?id=${d.id}'"]`);
          if (card && !card.querySelector('.movie-card-badge')) {
            const badge = document.createElement('span');
            badge.className = 'movie-card-badge';
            badge.textContent = 'New';
            card.appendChild(badge);
          }
        }
      }
    });
  } catch (e) {
    document.getElementById('latest-grid').innerHTML = '<div class="empty-state"><p>Failed to load.</p></div>';
  }
}

async function loadVlogsPreview() {
  try {
    const q = query(collection(db, 'vlogs'), orderBy('createdAt', 'desc'), limit(3));
    const snap = await getDocs(q);
    const grid = document.getElementById('vlogs-preview');
    if (snap.empty) { grid.innerHTML = '<div class="empty-state"><div class="icon">📹</div><h3>No vlogs yet</h3></div>'; return; }
    grid.innerHTML = snap.docs.map(d => {
      const v = { id: d.id, ...d.data() };
      const vid = getYouTubeId(v.youtubeUrl || '');
      return `
      <div class="vlog-card">
        <div class="vlog-embed">
          ${vid ? `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>` : ''}
        </div>
        <div class="vlog-body">
          <div class="vlog-title">${v.title}</div>
          <div class="vlog-meta">${v.description || ''}</div>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('vlogs-preview').innerHTML = '<div class="empty-state"><p>Failed to load vlogs.</p></div>';
  }
}

function renderGenreChips() {
  document.getElementById('genre-chips').innerHTML = CATEGORIES.map(c =>
    `<a href="/movies.html?cat=${c}" class="chip">${c}</a>`
  ).join('');
}

loadHero();
loadTrending();
loadLatest();
loadVlogsPreview();
renderGenreChips();
</script>

</body>
</html>
