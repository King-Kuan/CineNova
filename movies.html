<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies — CineNova</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .movies-page-header {
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      padding: 60px 40px 40px;
      border-bottom: 1px solid var(--border);
    }
    .movies-page-header h1 {
      font-family: var(--font-display);
      font-size: 48px; letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .movies-page-header p { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
    .search-filter-row {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .search-filter-row .search-wrap { flex: 1; min-width: 200px; max-width: 400px; }
    .movies-count { font-size: 13px; color: var(--text3); margin-top: 16px; }
    @media(max-width:768px){
      .movies-page-header { padding: 40px 20px 28px; }
      .movies-page-header h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
<div id="navbar-wrap"></div>
<div id="ribbon-ad-wrap"></div>

<main class="page-wrap">
  <div class="movies-page-header">
    <h1>All Movies</h1>
    <p>Browse, filter, and download your favorite films</p>
    <div class="search-filter-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search movies...">
      </div>
      <select class="form-select" id="sort-select" style="width:auto;padding:10px 14px">
        <option value="newest">Newest First</option>
        <option value="popular">Most Downloaded</option>
        <option value="az">A–Z</option>
        <option value="za">Z–A</option>
      </select>
    </div>
    <div style="margin-top:20px">
      <div class="filter-chips" id="cat-chips"></div>
    </div>
    <div class="movies-count" id="movies-count"></div>
  </div>

  <section class="section">
    <div class="movies-grid" id="movies-grid">
      <div class="loader"></div>
    </div>
    <div style="text-align:center;margin-top:40px">
      <button class="btn btn-ghost" id="load-more-btn" style="display:none">Load More</button>
    </div>
  </section>
</main>

<div id="footer-wrap"></div>
<div class="toast-container"></div>

<script type="module">
import { db, renderNavbar, renderFooter, initNavbar } from '/js/firebase-config.js';
import { injectAds } from '/js/ads.js';
import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

document.getElementById('navbar-wrap').innerHTML = renderNavbar('movies');
document.getElementById('footer-wrap').innerHTML = renderFooter();
initNavbar('movies');
injectAds();

const CATEGORIES = ['All','Action','Drama','Comedy','Horror','Thriller','Romance','Sci-Fi','Animation','Documentary','Fantasy'];
let allMovies = [], filtered = [], activecat = 'All', sortMode = 'newest', searchQ = '';
const PAGE_SIZE = 20;
let page = 1;

document.getElementById('cat-chips').innerHTML = CATEGORIES.map(c =>
  `<span class="chip${c === 'All' ? ' active' : ''}" data-cat="${c}">${c}</span>`
).join('');

document.querySelectorAll('#cat-chips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#cat-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activecat = chip.dataset.cat;
    page = 1;
    applyFilters();
  });
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  page = 1;
  applyFilters();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  page = 1;
  applyFilters();
});

document.getElementById('load-more-btn').addEventListener('click', () => {
  page++;
  renderGrid(false);
});

// Check URL params
const params = new URLSearchParams(location.search);
if (params.get('cat')) {
  // Decode and trim to avoid encoding/whitespace mismatches
  activecat = decodeURIComponent(params.get('cat')).trim();
  document.querySelectorAll('#cat-chips .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat.toLowerCase() === activecat.toLowerCase());
  });
}

async function loadMovies() {
  try {
    const snap = await getDocs(query(collection(db, 'movies'), orderBy('createdAt', 'desc')));
    allMovies = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applyFilters();
  } catch (e) {
    document.getElementById('movies-grid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Failed to load movies</h3></div>';
  }
}

function applyFilters() {
  filtered = allMovies.filter(m => {
    const matchCat = activecat === 'All' || (m.category || '').trim().toLowerCase() === activecat.trim().toLowerCase();
    const matchSearch = !searchQ || m.title?.toLowerCase().includes(searchQ) || m.description?.toLowerCase().includes(searchQ);
    return matchCat && matchSearch;
  });

  if (sortMode === 'popular') filtered.sort((a, b) => (b.downloads || 0) - (a.downloads || 0));
  else if (sortMode === 'az') filtered.sort((a, b) => a.title?.localeCompare(b.title));
  else if (sortMode === 'za') filtered.sort((a, b) => b.title?.localeCompare(a.title));
  else filtered.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

  document.getElementById('movies-count').textContent = `${filtered.length} movie${filtered.length !== 1 ? 's' : ''} found`;
  renderGrid(true);
}

function renderGrid(reset) {
  const grid = document.getElementById('movies-grid');
  const slice = filtered.slice(0, page * PAGE_SIZE);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎬</div><h3>No movies found</h3><p>Try a different category or search term.</p></div>';
    document.getElementById('load-more-btn').style.display = 'none';
    return;
  }

  if (reset) grid.innerHTML = '';

  const start = reset ? 0 : (page - 1) * PAGE_SIZE;
  const newItems = filtered.slice(start, page * PAGE_SIZE);
  newItems.forEach(m => {
    const div = document.createElement('div');
    div.className = 'movie-card';
    div.onclick = () => location.href = `/movie.html?id=${m.id}`;
    div.innerHTML = `
      <div class="movie-card-poster">
        <img src="${m.posterUrl || 'https://via.placeholder.com/200x300/141c26/4a6070?text=No+Image'}" alt="${m.title}" loading="lazy">
        <div class="movie-card-overlay">
          <div class="movie-card-play">▶</div>
        </div>
      </div>
      <div class="movie-card-body">
        <div class="movie-card-title">${m.title}</div>
        <div class="movie-card-meta">
          <span class="movie-card-year">${m.year || ''}</span>
          <span class="movie-card-cat">${m.category || ''}</span>
        </div>
      </div>`;
    grid.appendChild(div);
  });

  document.getElementById('load-more-btn').style.display = filtered.length > page * PAGE_SIZE ? 'inline-flex' : 'none';
}

loadMovies();
</script>
</body>
</html>
